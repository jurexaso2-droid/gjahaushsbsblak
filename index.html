<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Feed</title>
    <style>
        /* CSS Variables for Dark Mode */
        :root {
            --bg-color: #0f0f0f;
            --text-color: #f1f1f1;
            --card-bg: #212121;
            --primary-color: #3ea6ff;
            --hover-color: #383838;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* STICKY PLAYER - Stays at the top while you scroll */
        #player-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: #000;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-container {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }

        #now-playing-title {
            width: 100%;
            max-width: 1000px;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background: var(--bg-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-bottom: 1px solid #333;
        }

        /* VIDEO FEED GRID */
        #feed-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .video-card:hover {
            transform: scale(1.02);
            background-color: var(--hover-color);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background-color: #333;
        }

        .card-info {
            padding: 12px;
        }

        .card-title {
            font-size: 1rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* limits to 2 lines of text */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* PAGINATION / LOAD MORE */
        .pagination-container {
            text-align: center;
            padding: 30px;
        }

        #load-more-btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #load-more-btn:hover {
            opacity: 0.8;
        }

        #load-more-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        .loading-text {
            display: none;
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- TOP STICKY PLAYER -->
    <div id="player-wrapper">
        <div class="video-container">
            <video id="main-player" controls autoplay playsinline>
                <!-- Source will be injected by JavaScript -->
            </video>
        </div>
        <div id="now-playing-title">Select a video from below to play...</div>
    </div>

    <!-- SCROLLABLE VIDEO FEED -->
    <div id="feed-container">
        <!-- Video cards will be injected here -->
    </div>

    <div id="loading-indicator" class="loading-text">Fetching more videos...</div>

    <!-- PAGINATION -->
    <div class="pagination-container">
        <button id="load-more-btn">Load More Videos</button>
    </div>

    <script>
        // Mapping exactly to your JSON schema
        const API_MAPPING = {
            title: 'title',       
            thumbnail: 'image',   
            videoUrl: 'videoUrl'  
        };

        let currentPage = 1;
        let isFetching = false;

        const feedContainer = document.getElementById('feed-container');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const mainPlayer = document.getElementById('main-player');
        const nowPlayingTitle = document.getElementById('now-playing-title');
        const loadingIndicator = document.getElementById('loading-indicator');

        // Fetch videos from your API
        async function fetchVideos(page) {
            if (isFetching) return;
            isFetching = true;
            loadMoreBtn.disabled = true;
            loadingIndicator.style.display = 'block';

            try {
                const response = await fetch(`https://betadash-api-swordslush-production.up.railway.app/xvideos?page=${page}`);
                const data = await response.json();
                
                // Your JSON wraps the array in "result"
                const videoList = data.result || [];

                if (videoList.length === 0) {
                    loadMoreBtn.innerText = "No more videos available";
                    loadMoreBtn.disabled = true;
                    loadingIndicator.style.display = 'none';
                    return;
                }

                renderVideos(videoList);
                loadMoreBtn.disabled = false;

            } catch (error) {
                console.error("Error fetching videos:", error);
                alert("Failed to load videos. Check console for details.");
                loadMoreBtn.disabled = false;
            } finally {
                isFetching = false;
                loadingIndicator.style.display = 'none';
            }
        }

        // Render video cards to the grid
        function renderVideos(videos) {
            videos.forEach(video => {
                // Extract data using the mapped keys
                const title = video[API_MAPPING.title] || "Unknown Title";
                const thumb = video[API_MAPPING.thumbnail] || "https://via.placeholder.com/300x170?text=No+Thumbnail";
                const vidUrl = video[API_MAPPING.videoUrl];

                // Create Card Element
                const card = document.createElement('div');
                card.className = 'video-card';
                
                card.innerHTML = `
                    <img src="${thumb}" alt="${title}" class="thumbnail" loading="lazy">
                    <div class="card-info">
                        <div class="card-title" title="${title}">${title}</div>
                    </div>
                `;

                // Add Click Event to play the video
                card.addEventListener('click', () => {
                    playVideo(vidUrl, title);
                    // Scroll smoothly back to the top to watch the video
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                feedContainer.appendChild(card);
            });
        }

        // Play the selected video in the top player
        function playVideo(url, title) {
            if (!url) {
                alert("No video URL provided.");
                return;
            }

            // Update title text
            nowPlayingTitle.innerText = title;

            // Load and play the MP4 URL
            mainPlayer.src = url;
            mainPlayer.play().catch(e => {
                console.warn("Autoplay prevented by browser. User must click play.", e);
            });
        }

        // Pagination "Load More" Event
        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            fetchVideos(currentPage);
        });

        // Initialize Page 1 on load
        fetchVideos(currentPage);

    </script>
</body>
</html>
